<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
</head>

<body>

<h2>Registration Form</h2>

<form>

    <!-- Name -->
    <label>Full Name:</label><br>
    <input type="text" name="name" required><br><br>

    <!-- Email -->
    <label>Email:</label><br>
    <input type="email" name="email" required><br><br>

    <!-- Password -->
    <label>Password:</label><br>
    <input type="password" name="password" required><br><br>

    <!-- Contact -->
    <label>Contact Number:</label><br>
    <input type="tel" name="contact" required><br><br>

    <!-- Address -->
    <label>Address:</label><br>
    <textarea name="address" rows="4" cols="30" required></textarea><br><br>

    <!-- State Dropdown -->
    <label>State:</label><br>
    <select name="state" required>
        <option>Select State</option>
        <option>Gujarat</option>
        <option>Maharashtra</option>
        <option>Rajasthan</option>
        <option>Delhi</option>
        <option>Punjab</option>
        <option>Karnataka</option>
        <option>Tamilnadu</option>
        <option>Goa</option>
        <option>Madhya Pradesh</option>
        <option>Uttar Pradsh</option>
        <option>Bihar</option>

    </select><br><br>

    <!-- Gender Radio -->
    <label>Gender:</label><br>
    <input type="radio" name="gender" value="Male"> Male
    <input type="radio" name="gender" value="Female"> Female
    <input type="radio" name="gender" value="Other"> Other
    <br><br>

    <!-- Hobbies (Checkbox) -->
    <label>Hobbies:</label><br>
   
    <input type="checkbox" name="sports" value="Cricket"> Cricket<br>
    <input type="checkbox" name="sports" value="Football"> Football<br>
    <input type="checkbox" name="sports" value="Basketball"> Basketball<br>
    <input type="checkbox" name="sports" value="Volly-Ball"> Volly-Ball<br>
    <input type="checkbox" name="sports" value="Badmintion"> Badmintion<br>
    <input type="checkbox" name="sports" value="power-lifting"> power-lifting<br>
    <input type="checkbox" name="fitness" value="Gym"> Gym<br>
    <input type="checkbox" name="fitness" value="Yoga"> Yoga<br>
    <input type="checkbox" name="fitness" value="Running"> Running<br>
    <input type="checkbox" name="sports" value="Drawing"> Drwaing<br>
    <input type="checkbox" name="hobby" value="Reading"> Reading<br>
    <input type="checkbox" name="hobby" value="Music"> Music<br>
    <input type="checkbox" name="hobby" value="Traveling"> Traveling<br>
    <input type="checkbox" name="sports" value="exploring"> Exploring<br>

    <!-- Submit -->
    <input type="submit" value="Submit">

</form>

</body>
</html>
