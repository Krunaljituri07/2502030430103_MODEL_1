<!DOCTYPE html>
<html>
<head>
    <title>College Student Enrolment Form</title>
</head>
<body>

    <h2>College Student Enrolment Form</h2>

    <form>

        <label>Student Name:</label><br>
        <input type="text" name="sname"><br><br>

        <label>Enrolment Number:</label><br>
        <input type="text" name="enroll"><br><br>

        <label>Email ID:</label><br>
        <input type="email" name="email"><br><br>

        <label>Course:</label><br>
        <select>
            <option>BCA</option>
            <option>BBA</option>
            <option>B.Com</option>
            <option>B.Sc</option>
        </select><br><br>

        <label>Subjects Chosen:</label>
        <ul>
            <li>Computer Fundamentals</li>
            <li>Mathematics</li>
            <li>English</li>
        </ul>

        <label>Hobbies:</label>
        <ul>
            <li>Sports
                <ul>
                    <li>Cricket</li>
                    <li>Football</li>
                </ul>
            </li>

            <li>Music
                <ul>
                    <li>Singing</li>
                    <li>Guitar</li>
                </ul>
            </li>
        </ul>

        <input type="submit" value="Submit">

    </form>

</body>
</html>
