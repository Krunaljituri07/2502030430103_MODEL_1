<!-- ================= CART JS ================= -->

<script>

$(document).ready(function(){

    loadCartPage();

});

/* ================= LOAD CART ================= */

function loadCartPage(){

    let cart =
    JSON.parse(localStorage.getItem('cart'))
    || [];

    let $cartList =
    $('#cart-items-list');

    let total = 0;

    $('#cart-items').text(cart.length);

    if(cart.length === 0){

        $cartList.html(`

            <div class="empty-cart">

                <h2>
                    🛒 Your Cart Is Empty
                </h2>

                <p>
                    Start adding dream cars.
                </p>

                <br>

                <a href="index.html"
                class="btn-primary">

                    Continue Shopping

                </a>

            </div>

        `);

        $('#cart-total').text(0);

        return;

    }

    $cartList.empty();

    cart.forEach(function(car,index){

        let priceNum =
        parseFloat(
            car.price.replace(/[₹,Cr]/g,'')
        );

        total += priceNum;

        $cartList.append(`

            <div class="cart-item">

                <div class="cart-left">

                    <img src="${car.image}"
                    alt="${car.name}">

                </div>

                <div class="cart-right">

                    <h3>
                        ${car.name}
                    </h3>

                    <p>
                        Premium luxury performance car.
                    </p>

                    <div class="cart-price">
                        ${car.price}
                    </div>

                    <button
                    class="btn-wishlist"
                    onclick="removeFromCart(${index})">

                        Remove

                    </button>

                </div>

            </div>

        `);

    });

    $('#cart-total').text(
        total.toLocaleString()
    );

}

/* ================= REMOVE ================= */

function removeFromCart(index){

    let cart =
    JSON.parse(localStorage.getItem('cart'))
    || [];

    cart.splice(index,1);

    localStorage.setItem(
        'cart',
        JSON.stringify(cart)
    );

    loadCartPage();

}

/* ================= CHECKOUT ================= */

$('.btn-checkout').click(function(){

    alert(

    );

});

</script>
