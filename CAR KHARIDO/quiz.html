<!-- ================= QUIZ HERO ================= -->

<section class="about-hero">

    <div class="hero-content">

        <h1>

            Find Your Perfect Car

        </h1>

        <p>

            Take the smart luxury quiz.

        </p>

    </div>

</section>

<!-- ================= QUIZ SECTION ================= -->

<section class="auth-section">

    <div class="container">

        <div class="auth-container">

            <div class="auth-card">

                <div class="auth-header">

                    <h2>

                        <i class="fas fa-car"></i>

                        Car Recommendation Quiz

                    </h2>

                    <p>

                        Answer a few questions.

                    </p>

                </div>

                <form id="carQuizForm">

                    <!-- BUDGET -->

                    <div class="form-group">

                        <label>

                            Your Budget

                        </label>

                        <select
                        id="budget"
                        class="quiz-input"
                        required>

                            <option value="₹50L - ₹1Cr">

                                ₹50L - ₹1Cr

                            </option>

                            <option value="₹1Cr - ₹2Cr">

                                ₹1Cr - ₹2Cr

                            </option>

                            <option value="₹2Cr+">

                                ₹2Cr+

                            </option>

                        </select>

                    </div>

                    <!-- CAR TYPE -->

                    <div class="form-group">

                        <label>

                            Which Type Of Car
                            Do You Want?

                        </label>

                        <select
                        id="carType"
                        class="quiz-input"
                        required>

                            <option value="luxury">

                                Luxury

                            </option>

                            <option value="sports">

                                Sports

                            </option>

                            <option value="electric">

                                Electric

                            </option>

                            <option value="suv">

                                SUV

                            </option>

                        </select>

                    </div>

                    <!-- COLOR -->

                    <div class="form-group">

                        <label>

                            Favorite Color

                        </label>

                        <select
                        class="quiz-input">

                            <option>

                                Black

                            </option>

                            <option>

                                White

                            </option>

                            <option>

                                Red

                            </option>

                            <option>

                                Blue

                            </option>

                        </select>

                    </div>

                    <!-- SUBMIT -->

                    <button
                    type="submit"
                    class="btn-primary full-width">

                        Find My Dream Car

                    </button>

                </form>

                <!-- RESULT -->

                <div id="quiz-result">

                </div>

            </div>

        </div>

    </div>

</section>
